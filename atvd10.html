<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador de Idades</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 400px; margin: auto; border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        input { padding: 8px; width: 60px; }
        button { padding: 8px 15px; cursor: pointer; }
        .resultados { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Censo Simples</h2>
    <p>Digite a idade e clique em Adicionar. Para encerrar, digite 0 ou um número negativo.</p>
    
    <input type="number" id="idadeInput" placeholder="Ex: 25">
    <button onclick="processarIdade()">Adicionar</button>

    <div class="resultados">
        <p>Menores de 18 anos: <span id="resMenores">0</span></p>
        <p>Maiores de 65 anos: <span id="resMaiores">0</span></p>
    </div>
    
    <button onclick="reiniciar()" style="background-color: #eee; border: 1px solid #999;">Reiniciar</button>
</div>


</body>
</html>
<script src="js/atvd10.js"></script>
</body>
</html>
